name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/ursus_windows_amd64.exe ./cmd/ursus
          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/ursus_linux_amd64 ./cmd/ursus
          # macOS (Intel)
          GOOS=darwin GOARCH=amd64 go build -o dist/ursus_darwin_amd64 ./cmd/ursus
          # macOS (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o dist/ursus_darwin_arm64 ./cmd/ursus

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ursus_windows_amd64.exe
            dist/ursus_linux_amd64
            dist/ursus_darwin_amd64
            dist/ursus_darwin_arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
